name: Deploy to server
on:
  push:
    branches: [main]
jobs:
  check-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: python -m py_compile webforms.py bot.py models.py api_1c.py
      - name: Ready for deployment
        run: echo "✓ Code syntax check passed. Deploy manually on server."
