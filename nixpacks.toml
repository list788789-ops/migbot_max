# Конфигурация сборки Railway (Nixpacks).
# Добавляет LibreOffice в контейнер для конвертации docx -> pdf (пакет документов для Госуслуг:
# договор и квитанция отдаются в PDF, генерируемые из docx через soffice --headless).
#
# ВАЖНО: если в репозитории УЖЕ был nixpacks.toml — не затирай его этим файлом целиком,
# а добавь 'libreoffice' в nixPkgs существующего. Этот файл рассчитан на случай, когда
# конфигурации сборки ещё не было (Railway собирал автоматически по requirements.txt).
#
# libreoffice-fresh — полный офисный пакет; для конвертации достаточно, тянет ~300-400 МБ.
# На Hobby-плане (до 8 ГБ RAM/сервис) памяти хватает: soffice запускается разово на секунды
# при конвертации, постоянно память не занимает.

[phases.setup]
nixPkgs = ["...", "libreoffice"]

# "..." сохраняет пакеты, которые Nixpacks определил автоматически (Python и пр.) —
# без него они будут заменены, и сборка сломается. libreoffice добавляется К ним.
